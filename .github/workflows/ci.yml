name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm test
      - run: npm run test:e2e
        env:
          JWT_SECRET: ci-test-jwt-secret
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_sigaps
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://sigaps-api.onrender.com
          VITE_DEV_AUTO_LOGIN: "false"

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: sigaps
          POSTGRES_PASSWORD: sigaps_secret
          POSTGRES_DB: sigaps
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sigaps -d sigaps"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Playwright full-stack e2e
        run: bash scripts/ci-e2e.sh
        env:
          DATABASE_URL: postgresql://sigaps:sigaps_secret@127.0.0.1:5432/sigaps?schema=public
          JWT_SECRET: ci-e2e-jwt-secret
          JWT_REFRESH_SECRET: ci-e2e-jwt-refresh-secret
          CI: "true"

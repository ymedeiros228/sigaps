name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate-database:
    name: Banco (Supabase)
    runs-on: ubuntu-latest
    if: ${{ secrets.DATABASE_URL != '' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed (dados Passagem Franca)
        run: npx prisma db seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-frontend:
    name: Site (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [migrate-database]
    if: |
      always() &&
      (needs.migrate-database.result == 'success' || needs.migrate-database.result == 'skipped') &&
      secrets.CLOUDFLARE_API_TOKEN != '' &&
      secrets.CLOUDFLARE_ACCOUNT_ID != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_DEV_AUTO_LOGIN: "false"

      - name: Publicar no Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=sigaps --branch=master

  deploy-backend:
    name: API (Render)
    runs-on: ubuntu-latest
    needs: [migrate-database]
    if: |
      always() &&
      (needs.migrate-database.result == 'success' || needs.migrate-database.result == 'skipped') &&
      secrets.RENDER_DEPLOY_HOOK != ''
    steps:
      - name: Disparar redeploy no Render
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

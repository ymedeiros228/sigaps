name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate-database:
    name: Banco (Supabase)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Verificar DATABASE_URL
        id: check
        run: |
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DATABASE_URL nao configurado — pulando migrate/seed"
          fi

      - run: npm ci
        if: steps.check.outputs.configured == 'true'

      - run: npx prisma generate
        if: steps.check.outputs.configured == 'true'

      - name: Aplicar migrações (com reparo P3009)
        if: steps.check.outputs.configured == 'true'
        run: bash scripts/migrate-deploy.sh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed (dados Passagem Franca)
        if: steps.check.outputs.configured == 'true'
        continue-on-error: true
        run: npx prisma db seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-frontend:
    name: Site (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [migrate-database]
    steps:
      - uses: actions/checkout@v4

      - name: Verificar secrets Cloudflare
        id: cf
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] && [ -n "${{ secrets.VITE_API_URL }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare/VITE_API_URL nao configurados — pulando deploy do site"
          fi

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.configured == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        if: steps.cf.outputs.configured == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_DEV_AUTO_LOGIN: "false"

      - name: Publicar no Cloudflare Pages
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=sigaps --branch=master

  deploy-backend:
    name: API + Site (Render)
    runs-on: ubuntu-latest
    needs: [migrate-database]
    steps:
      - name: Verificar Deploy Hook
        id: hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RENDER_DEPLOY_HOOK ausente — Render depende do Auto-Deploy do Git"
          fi

      - name: Disparar redeploy no Render
        if: steps.hook.outputs.configured == 'true'
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Aguardar API atualizar
        if: steps.hook.outputs.configured == 'true'
        env:
          API_URL: ${{ secrets.VITE_API_URL }}
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          BASE="${API_URL:-https://sigaps-api.onrender.com}"
          BASE="${BASE%/}"
          echo "Aguardando ${BASE}/health reportar commit ${EXPECTED_COMMIT:0:7}..."
          for i in $(seq 1 36); do
            BODY=$(curl -fsS "${BASE}/health" || true)
            COMMIT=$(echo "$BODY" | sed -n 's/.*"commit":"\([^"]*\)".*/\1/p')
            if [ -n "$COMMIT" ] && [ "$COMMIT" = "$EXPECTED_COMMIT" ]; then
              echo "Deploy confirmado: $COMMIT"
              exit 0
            fi
            echo "Tentativa $i/36 — commit atual: ${COMMIT:-desconhecido}"
            sleep 10
          done
          echo "::warning::Render ainda nao reportou o commit esperado apos 6 minutos"
